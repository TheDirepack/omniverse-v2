<div id="snapshots-container" class="space-y-4">
    <div class="flex items-center justify-between border-b pb-2">
        <h3 class="text-lg font-semibold">Database Snapshots</h3>
        <div class="flex gap-2">
            <input type="text" name="name" id="snapshot-name" placeholder="Snapshot Name..." class="text-sm p-1 border rounded">
            <input type="hidden" name="snapshot_type" value="FULL">
            <button hx-post="{{ snapshot_url_prefix }}/snapshots/create" 
                    hx-include="#snapshot-name, [name='snapshot_type']" 
                    hx-target="#snapshots-list" 
                    hx-swap="innerHTML"
                    class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
                Create Snapshot
            </button>
        </div>
    </div>

    <div id="snapshots-list" class="grid gap-2">
        {% for s in snapshots %}
        <div class="flex items-center justify-between p-3 bg-gray-800 rounded border border-gray-700">
            <div>
                <span class="font-medium">{{ s.name }}</span>
                <span class="text-xs text-gray-400 ml-2">{{ s.created_at }}</span>
                <span class="text-xs bg-gray-700 px-2 py-0.5 rounded ml-2">{{ s.snapshot_type }}</span>
            </div>
            <div class="flex gap-2">
                <button hx-post="{{ snapshot_url_prefix }}/snapshots/{{ s.id }}/restore" 
                        hx-target="body" 
                        hx-confirm="Are you sure you want to restore this snapshot? This will overwrite the current database."
                        class="text-xs bg-green-700 text-white px-2 py-1 rounded hover:bg-green-600">
                    Restore
                </button>
                <button hx-delete="{{ snapshot_url_prefix }}/snapshots/{{ s.id }}" 
                        hx-target="#snapshots-list" 
                        hx-swap="innerHTML"
                        hx-confirm="Permanently delete this snapshot?"
                        class="text-xs bg-red-900 text-white px-2 py-1 rounded hover:bg-red-800">
                    Delete
                </button>
            </div>
        </div>
        {% else %}
        <div class="text-center text-gray-500 py-4">No snapshots available.</div>
        {% endfor %}
    </div>
</div>
