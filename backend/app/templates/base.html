<!DOCTYPE html>
<html lang="en" class="h-full bg-white dark:bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omniverse V2{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Immediate Dark Mode Application to prevent flashing
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        precision: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            dark50: '#0f172a',
                            dark100: '#1e293b',
                            dark200: '#334155',
                            dark300: '#475569',
                        }
                    }
                }
            }
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }
        .htmx-request.htmx-indicator { display: flex; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full overflow-hidden text-gray-900 dark:text-gray-100">
    <div class="flex h-full w-full">
        <!-- SIDEBAR -->
        <aside class="w-64 h-full bg-gray-50 border-r border-gray-200 dark:bg-gray-900 dark:border-gray-800 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
                <span class="text-xs font-black tracking-tighter uppercase text-gray-400 dark:text-gray-500">Omniverse V2</span>
                <button onclick="toggleDarkMode()" class="p-1 rounded-sm bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors">
                    <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
                </button>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar">
                <a href="/" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <span>🏠</span> Home
                </a>
                <a href="/research" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <span>🔍</span> Research
                </a>
                <a href="/knowledge" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <span>🕸️</span> Knowledge
                </a>
                <a href="/logs" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <span>📜</span> Logs
                </a>
                <div class="pt-4 pb-2">
                    <span class="px-3 text-[10px] font-bold uppercase tracking-widest text-gray-400 dark:text-gray-600">System</span>
                </div>
                <a href="/settings" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-sm text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    <span>⚙️</span> Settings
                </a>
            </nav>
            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <div class="text-[10px] text-gray-400 dark:text-gray-600 text-center">v2.0.0-stable</div>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 h-full flex flex-col overflow-hidden bg-white dark:bg-gray-950">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
