<h2 class="text-xs font-bold uppercase tracking-widest mb-2">Models and capabilities</h2>{% for provider in settings.providers %}<section class="mb-4"><h3 class="font-mono text-xs">{{ provider.id }}</h3><table class="w-full text-xs">{% for model in provider.models %}<tr class="border-b"><td class="p-2"><code>{{ model.id }}</code></td><td>{{ model.name }}</td><td>Tools: {{ model.supports_tools }}</td><td>Structured: {{ model.supports_structured }}</td></tr>{% else %}<tr><td class="p-2 text-gray-500">No models.</td></tr>{% endfor %}</table><form class="mt-2 grid grid-cols-2 lg:grid-cols-4 gap-2 text-xs border border-gray-200 dark:border-gray-800 p-2" hx-post="/settings/providers/{{ provider.id }}/models" hx-target="#settings-content"><input name="model_id" required placeholder="String model ID" class="h-7 px-2 border bg-transparent"><input name="model_name" required placeholder="Provider model name" class="h-7 px-2 border bg-transparent"><input name="context_window" type="number" min="1" placeholder="Context window" class="h-7 px-2 border bg-transparent"><input name="output_limit" type="number" min="1" placeholder="Output limit" class="h-7 px-2 border bg-transparent"><label><input name="supports_text" type="checkbox" value="true" checked> Text</label><label><input name="supports_tools" type="checkbox" value="true"> Tools</label><label><input name="supports_structured" type="checkbox" value="true"> Structured</label><label><input name="active" type="checkbox" value="true" checked> Active</label><button class="h-7 px-3 bg-blue-600 text-white">Save model</button></form></section>{% endfor %}
