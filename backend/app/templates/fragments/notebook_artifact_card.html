<div id="artifact-{{ artifact.id }}" class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow border-l-4 border-blue-500 flex flex-col gap-2">
    <div class="flex justify-between items-start">
        <div class="font-semibold text-blue-800">{{ artifact.universe_name }}</div>
        <div class="text-xs font-mono text-gray-500">ID: {{ artifact.id }}</div>
    </div>
    
    <div class="text-sm text-gray-700 dark:text-gray-300">
        <span class="font-bold">{{ artifact.subject }}</span> 
        <span class="text-blue-600 dark:text-blue-400">{{ artifact.predicate }}</span> 
        <span>{{ artifact.object_val }}</span>
    </div>

    {% if artifact.reference %}
    <div class="text-xs text-gray-500 italic">
        Ref: {{ artifact.reference }}
    </div>
    {% endif %}

    <div class="flex justify-between items-center mt-2">
        <div class="flex items-center gap-3">
            <div class="text-xs font-medium px-2 py-1 bg-blue-50 text-blue-700 rounded">
                Conf: {{ artifact.confidence or 'N/A' }}
            </div>
             <a href="{{ url_for('notebook_artifact_provenance', artifact_id=artifact.id) }}" class="text-xs text-blue-600 hover:underline">
                Trace
            </a>
        </div>
        <div class="flex gap-2">
             <button hx-post="{{ url_for('reject_artifact', artifact_id=artifact.id) }}" 
                    hx-target="#artifact-{{ artifact.id }}" 
                    hx-swap="outerHTML"
                    hx-indicator="closest button"
                    class="text-xs px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200 transition btn-loading">
                Reject
            </button>
             <button hx-post="{{ url_for('approve_artifact', artifact_id=artifact.id) }}" 
                    hx-target="#artifact-{{ artifact.id }}" 
                    hx-swap="outerHTML"
                    hx-indicator="closest button"
                    class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 transition btn-loading">
                Approve
            </button>
        </div>
    </div>
</div>
