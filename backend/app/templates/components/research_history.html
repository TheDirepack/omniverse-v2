<div class="space-y-4">
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">Recent Research Jobs</h3>
        <button hx-get="/research/choose-world" 
                hx-target="body" 
                class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700 transition">
            + New Job
        </button>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
            <thead class="text-xs text-gray-500 uppercase bg-gray-50 dark:bg-gray-900">
                <tr>
                    <th class="px-4 py-2">World/Goal</th>
                    <th class="px-4 py-2">Status</th>
                    <th class="px-4 py-2">Node</th>
                    <th class="px-4 py-2">Date</th>
                    <th class="px-4 py-2">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                {% for run in runs %}
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800 transition">
                    <td class="px-4 py-3 font-medium truncate max-w-xs">{{ run.world }}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase 
                            {{ 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' if run.status == 'COMPLETED' else 
                               'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' if run.status == 'FAILED' else 
                               'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' }}">
                            {{ run.status }}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-gray-500 dark:text-gray-400">{{ run.node }}</td>
                    <td class="px-4 py-3 text-gray-500 dark:text-gray-400">{{ run.created_at[:16].replace('T', ' ') }}</td>
                    <td class="px-4 py-3">
                        <button class="text-blue-600 hover:text-blue-800 font-medium"
                                 data-action="redirect-to-run" data-url="/api/v1/execution/runs/{{ run.run_id }}">
                            View Details
                        </button>
                    </td>
                </tr>
                {% endfor %}
                {% if not runs %}
                <tr>
                    <td colspan="5" class="px-4 py-8 text-center text-gray-500 italic">No research jobs found.</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>
