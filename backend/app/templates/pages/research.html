{% extends "base.html" %}
{% block title %}Research - Omniverse V2{% endblock %}
{% block content %}
<div class="flex flex-col h-full overflow-hidden">
  <header class="h-12 border-b border-gray-200 dark:border-gray-800 flex items-center px-4 gap-3 shrink-0">
    <h1 class="text-xs font-bold uppercase tracking-widest">Research</h1>
    <form class="flex items-center gap-2 flex-1">
      <label for="world-search" class="sr-only">Search worlds</label>
      <input id="world-search" name="q" type="search" hx-get="/research/worlds" hx-target="#world-results" hx-trigger="keyup changed delay:300ms, search" placeholder="Search worlds, franchises, categories..." class="h-7 w-full max-w-md px-3 text-xs bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-sm">
    </form>
  </header>
  <form id="research-form" class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-[1fr_22rem]" hx-post="/research/runs" hx-target="#run-queue" hx-swap="afterbegin">
    <section id="world-results" class="overflow-y-auto border-r border-gray-200 dark:border-gray-800">
      {% with worlds=worlds %}{% include "v2/research_worlds.html" %}{% endwith %}
    </section>
    <aside class="p-4 space-y-4 overflow-y-auto bg-gray-50 dark:bg-gray-900">
      <label class="block text-[10px] font-bold uppercase tracking-widest">Objective
        <textarea name="objective" required class="mt-1 w-full h-20 p-2 text-xs border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-950 rounded-sm"></textarea>
      </label>
      <label class="block text-[10px] font-bold uppercase tracking-widest">Continuity
        <input name="continuity" value="primary" required class="mt-1 h-8 w-full px-2 text-xs border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-950 rounded-sm">
      </label>
      <fieldset class="space-y-1"><legend class="text-[10px] font-bold uppercase tracking-widest">Domains</legend>
        <div class="grid grid-cols-1 gap-1">
          {% for domain in research_domains %}<label class="block text-xs"><input type="checkbox" name="domains" value="{{ domain }}" checked> {{ domain|replace('_', ' ')|title }}</label>{% endfor %}
        </div>
      </fieldset>
      <input type="hidden" name="idempotency_key" value="research-{{ range(1000000, 9999999)|random }}">
      <button class="h-8 w-full bg-blue-600 text-white text-xs font-semibold rounded-sm">Start research</button>
      <div id="run-queue" hx-get="/research/runs" hx-trigger="load" hx-swap="innerHTML" class="space-y-2" aria-live="polite"><p class="text-xs text-gray-500">Loading run queue...</p></div>
    </aside>
  </form>
</div>
{% endblock %}
