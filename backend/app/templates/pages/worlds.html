{% extends "base.html" %}

{% block title %}Worlds - Omniverse{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold">Worlds</h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
        <div class="flex border-b border-gray-200 dark:border-gray-700">
            <button class="world-tab-btn px-6 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600"
                    hx-get="/worlds/import"
                    hx-target="#world-modal-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                Import World
            </button>
            <button class="world-tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300"
                    hx-get="/worlds/create"
                    hx-target="#world-modal-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                Create Custom
            </button>
            <button class="world-tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300"
                    hx-get="/worlds/graph"
                    hx-target="#world-modal-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                World Graph
            </button>
            <div id="worlds-indicator" class="htmx-indicator flex items-center ml-auto px-4">
                <span class="animate-spin inline-block">⌛</span>
            </div>
        </div>
    </div>

    <!-- Modal for Worlds Content -->
    <div id="world-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-2xl w-full max-h-full overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold">World Management</h3>
                <button onclick="document.getElementById('world-modal').classList.add('hidden')" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
                    <span class="text-2xl">&times;</span>
                </button>
            </div>
            <div id="world-modal-content" class="p-6 overflow-y-auto">
                <p class="text-gray-500 dark:text-gray-400 italic">Select a tab above to manage worlds.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('htmx:afterOnLoad', function(evt) {
            if (evt.detail.target.id === 'world-modal-content') {
                document.getElementById('world-modal').classList.remove('hidden');
            }
        });
    </script>
</div>
{% endblock %}
