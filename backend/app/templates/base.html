<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omniverse{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        document.body.addEventListener('htmx:configRequest', (event) => {
            const token = getCookie('csrf_token');
            if (token) {
                event.detail.headers['X-CSRF-Token'] = token;
            }
        });

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
    </script>
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">Omniverse Research</a>
            <div class="flex items-center space-x-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-blue-500 transition" title="Toggle Dark Mode">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
                <a href="/research" class="hover:underline">Research</a>
                <a href="/worlds" class="hover:underline">Worlds</a>
                <a href="/knowledge" class="hover:underline">Knowledge</a>
                <a href="/logs" class="hover:underline">Logs</a>
                <a href="/settings" class="hover:underline">Settings</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4" 
          hx-on:htmx:response-error="alert('An error occurred while processing your request. Please try again.')">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center p-4 text-gray-500 text-sm dark:text-gray-400">
        &copy; 2026 Omniverse Tier List 2.0
    </footer>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>

</html>
