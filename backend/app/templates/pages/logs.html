{% extends "base.html" %}

{% block title %}Execution Dashboard - Omniverse{% endblock %}

{% block content %}
<div class="flex flex-col h-screen overflow-hidden bg-white dark:bg-gray-950">
    <!-- Top Bar -->
    <div class="flex justify-between items-center px-4 py-2 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 shrink-0">
        <div class="flex items-center gap-4 flex-1">
            <h1 class="text-sm font-bold uppercase tracking-wider text-gray-900 dark:text-gray-100 mr-4">Execution Dashboard</h1>
            <div class="relative w-64">
                <input type="text" 
                       id="run-filter"
                       name="filter"
                       placeholder="Filter active runs..." 
                       class="w-full px-3 py-1 text-xs border border-gray-300 dark:border-gray-700 focus:outline-none focus:border-blue-500 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100"
                        hx-get="/api/runs/active-detailed"
                       hx-trigger="keyup changed delay:300ms"
                       hx-target="#execution-table"
                       hx-include="#run-filter" />
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button 
                hx-get="/logs/list" 
                hx-target="#execution-table"
                class="px-3 py-1 text-xs font-bold uppercase tracking-tighter bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                View All Logs
            </button>
            <button 
                hx-post="/api/runs/abort-all" 
                hx-target="#execution-table"
                hx-confirm="Are you sure you want to abort all active research runs?"
                class="px-3 py-1 text-xs font-bold uppercase tracking-tighter bg-red-600 text-white hover:bg-red-700 transition">
                Abort All
            </button>
        </div>
    </div>

    <!-- Execution Table Container -->
    <div class="flex-1 overflow-auto bg-white dark:bg-gray-950">
        <div id="execution-table" 
             hx-get="/api/runs/active-detailed" 
             hx-trigger="load" 
             class="w-full">
            <!-- Table fragment loaded here -->
            <div class="flex items-center justify-center h-32 text-gray-400 dark:text-gray-500 text-xs italic">
                Initializing execution monitor...
            </div>
        </div>
    </div>
</div>

<style>
    /* Precision Tooling Style Overrides */
    .rounded-none {
        border-radius: 0 !important;
    }
</style>
{% endblock %}
