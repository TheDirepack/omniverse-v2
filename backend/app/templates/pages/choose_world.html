{% extends "base.html" %}

{% block title %}Choose World - Omniverse{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="text-center space-y-2">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-gray-100">Choose a World</h1>
        <p class="text-gray-500 dark:text-gray-400">Select a universe to start your research journey.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- World Selector (Main) -->
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Existing Worlds</h2>
                <div id="database-worlds" 
                      hx-get="{{ url_for('database_worlds') }}" 
                     hx-trigger="load" 
                     hx-swap="outerHTML">
                    <p class="text-gray-500 dark:text-gray-400 italic">Loading worlds...</p>
                </div>
                <div id="bulk-action-bar" class="flex items-center justify-between mt-3 px-2">
                    <div class="flex items-center gap-3">
                        <label class="flex items-center gap-1 text-xs text-gray-600 dark:text-gray-400 cursor-pointer">
                            <input type="checkbox" id="select-all" class="rounded-sm border-gray-300 dark:border-gray-700 text-blue-600 focus:ring-blue-500">
                            Select All
                        </label>
                        <span id="selected-count" class="text-xs text-gray-500 dark:text-gray-400">0 selected</span>
                    </div>
                    <button id="delete-selected-btn" hx-post="/worlds/delete-selected"
                            hx-target="#database-worlds"
                            data-hx-vals='{"uuids": []}'
                            hx-confirm="Delete selected worlds?"
                            class="px-3 py-1 bg-red-600 text-white rounded-sm hover:bg-red-700 transition text-xs font-medium">
                        Delete Selected
                    </button>
                </div>
            </div>
        </div>

        <!-- World Management (Side) -->
        <div class="space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-4">
                <h2 class="text-lg font-semibold mb-2">Add New World</h2>
                 <button class="w-full py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium"
                         hx-get="/worlds/import"
                          hx-target="#modal-content"
                          hx-swap="innerHTML"
                          hx-trigger="click">
                    Import from Registry
                </button>
                 <button class="w-full py-2 px-4 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm font-medium"
                         hx-get="/worlds/create_fragment"
                         hx-target="#modal-content"
                         hx-swap="innerHTML"
                         hx-trigger="click">
                    Create Custom World
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-root" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50" onclick="if(event.target===this)closeModal()">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-lg w-full mx-4 p-6 max-h-[80vh] overflow-y-auto">
        <div class="flex justify-end">
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">&times;</button>
        </div>
        <div id="modal-content"></div>
    </div>
</div>

<script>
function closeModal() {
    document.getElementById('modal-root').classList.add('hidden');
}
document.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'modal-content') {
        document.getElementById('modal-root').classList.remove('hidden');
    }
});
</script>
<script>
function getSelectedWorlds() {
    return Array.from(document.querySelectorAll('.world-checkbox:checked')).map(function(cb) { return cb.value; });
}
(function() {
    function updateCount() {
        var checked = document.querySelectorAll('.world-checkbox:checked');
        var count = checked.length;
        var el = document.getElementById('selected-count');
        if (el) el.textContent = count + ' selected';
        
        var uuids = Array.from(checked).map(function(cb) { return cb.value; });
        var btn = document.getElementById('delete-selected-btn');
        if (btn) btn.setAttribute('data-hx-vals', JSON.stringify({ uuids: uuids }));
    }
    document.addEventListener('change', function(e) {
        if (e.target && e.target.matches('.world-checkbox')) {
            updateCount();
        }
    });
    var selAll = document.getElementById('select-all');
    if (selAll) {
        selAll.addEventListener('change', function() {
            document.querySelectorAll('.world-checkbox').forEach(function(cb) { cb.checked = selAll.checked; });
            updateCount();
        });
    }
})();
// Populate hx-vals from selected worlds
document.addEventListener('DOMContentLoaded', () => {
  const uuids = Array.from(document.querySelectorAll('.world-checkbox:checked'))
    .map(cb => cb.value);
  const dataHxVals = document.querySelector('[data-hx-vals]');
  if (dataHxVals && uuids.length > 0) {
    dataHxVals.dataset.hxVals = JSON.stringify({ uuids });
  }
});
</script>
{% endblock %}
