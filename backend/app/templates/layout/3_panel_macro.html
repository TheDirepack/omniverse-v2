{% macro panel_layout(control_bar, left, center, right, extra) %}
<div class="flex flex-col h-full overflow-hidden">
    <!-- Control Bar -->
    {{ control_bar }}

    <div class="flex-1 flex overflow-hidden">
        <!-- Left Panel -->
        <div class="w-64 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 overflow-y-auto no-scrollbar shrink-0">
            {{ left }}
        </div>

        <!-- Center Workspace -->
        <div class="flex-1 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 overflow-y-auto no-scrollbar shrink-0">
            {{ center }}
        </div>

        <!-- Right Inspector -->
        <div class="w-80 bg-gray-50 dark:bg-gray-900 overflow-y-auto no-scrollbar">
            {{ right }}
        </div>
    </div>
</div>
{{ extra }}
{% endmacro %}
