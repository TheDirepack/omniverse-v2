<div class="p-4 space-y-2">{% for item in evidence %}<article class="border border-gray-200 dark:border-gray-800 p-3 text-xs"><div class="font-mono">{{ item.id }} / {{ item.source_revision_id }}</div><blockquote class="mt-2">{{ item.exact_excerpt }}</blockquote><span class="text-gray-500">{{ item.domain or "Unclassified" }}</span></article>{% else %}<p class="text-xs text-gray-500">No evidence fragments.</p>{% endfor %}</div>
