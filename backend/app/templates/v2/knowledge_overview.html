<div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4"><section class="border border-gray-200 dark:border-gray-800 p-4"><h2 class="text-xs font-bold uppercase tracking-widest">Overview</h2>{% for summary in summaries %}<pre class="mt-3 text-xs whitespace-pre-wrap">{{ summary|tojson(indent=2) }}</pre>{% else %}<p class="mt-3 text-xs text-gray-500">No completed summary is available.</p>{% endfor %}</section><section class="border border-gray-200 dark:border-gray-800 p-4"><h2 class="text-xs font-bold uppercase tracking-widest">Coverage</h2>{% for item in coverage %}<div class="mt-2 flex justify-between text-xs"><span>{{ item.domain }}</span><strong>{{ item.status }}</strong></div>{% else %}<p class="mt-3 text-xs text-gray-500">No coverage records.</p>{% endfor %}</section></div>
