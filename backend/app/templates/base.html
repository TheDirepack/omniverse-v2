<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omniverse{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        function openFocusedSearch(worlds = '', feature = '') {
            const modal = document.getElementById('focused-search-modal');
            const content = document.getElementById('focused-search-content');
            modal.classList.remove('hidden');
            
            htmx.ajax('GET', '/research/focused-search', {
                target: '#focused-search-content',
                swap: 'innerHTML'
            }).then(() => {
                const worldsInp = content.querySelector('[name=worlds]');
                const featInp = content.querySelector('[name=features]');
                if (worldsInp) worldsInp.value = worlds;
                if (featInp) featInp.value = feature;
                if (featInp) featInp.focus();
            });
        }

        function openWorldModal(type) {
            const modal = document.getElementById('world-modal');
            const content = document.getElementById('world-modal-content');
            modal.classList.remove('hidden');

            const endpoint = type === 'import' ? '/worlds/import' : '/worlds/create';
            
            htmx.ajax('GET', endpoint, {
                target: '#world-modal-content',
                swap: 'innerHTML'
            });
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
    </script>
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <!-- Focused Search Modal -->
    <div id="focused-search-modal" 
         class="hidden fixed inset-0 z-50 overflow-y-auto bg-black bg-opacity-50 flex items-center justify-center p-4"
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="focused-search-title">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-lg w-full max-h-full overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="focused-search-title" class="text-lg font-semibold">Focused Search</h3>
                <button onclick="document.getElementById('focused-search-modal').classList.add('hidden')" 
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                        aria-label="Close search modal">
                    <span class="text-2xl" aria-hidden="true">&times;</span>
                </button>
            </div>
            <div id="focused-search-content" class="p-6 overflow-y-auto">
                <div class="flex items-center justify-center h-32">
                    <p class="text-gray-500 dark:text-gray-400 italic">Loading focused search...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- World Management Modal -->
    <div id="world-modal" 
         class="hidden fixed inset-0 z-50 overflow-y-auto bg-black bg-opacity-50 flex items-center justify-center p-4"
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="world-modal-title">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-2xl w-full max-h-full overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="world-modal-title" class="text-lg font-semibold">World Management</h3>
                <button onclick="document.getElementById('world-modal').classList.add('hidden')" 
                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                        aria-label="Close world management modal">
                    <span class="text-2xl" aria-hidden="true">&times;</span>
                </button>
            </div>
            <div id="world-modal-content" class="p-6 overflow-y-auto">
                <!-- Content loaded via htmx -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[100] space-y-2"></div>

    <nav class="bg-blue-600 text-white p-4 shadow-md" aria-label="Main Navigation">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold" aria-label="Omniverse Research Home">Omniverse Research</a>
            <div class="flex items-center space-x-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-blue-500 transition" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                    <span class="dark:hidden" aria-hidden="true">🌙</span>
                    <span class="hidden dark:inline" aria-hidden="true">☀️</span>
                </button>
                <a href="/research/choose-world" class="hover:underline">Research</a>
                <a href="/worlds" class="hover:underline">Worlds</a>
                <a href="/knowledge" class="hover:underline">Knowledge</a>
                <a href="/logs" class="hover:underline">Logs</a>
                <a href="/settings" class="hover:underline">Settings</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4" 
          hx-on:htmx:response-error="showToast('An error occurred while processing your request. Please try again.', 'error')">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center p-4 text-gray-500 text-sm dark:text-gray-400">
        &copy; 2026 Omniverse Tier List 2.0
    </footer>

    <script>
        // Dark mode initialization
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Simple Toast System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            toast.className = `${bgColor} text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Modal Accessibility: Close on Escape
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modals = ['focused-search-modal', 'world-modal'];
                modals.forEach(id => {
                    const modal = document.getElementById(id);
                    if (modal && !modal.classList.contains('hidden')) {
                        modal.classList.add('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
