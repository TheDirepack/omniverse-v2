{% if active_run_ids %}
<div class="space-y-3">
    {% for run_id in active_run_ids %}
    <div class="flex items-center p-3 bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 rounded-lg">
        <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse mr-3"></div>
        <div class="flex-1">
            <div class="text-sm font-mono text-blue-800 dark:text-blue-300">{{ run_id }}</div>
            <div class="text-xs text-blue-600 dark:text-blue-400">Running...</div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-gray-500 italic text-sm">No active research runs.</p>
{% endif %}
