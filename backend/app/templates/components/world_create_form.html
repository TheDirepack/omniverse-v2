<div class="space-y-4">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Create Custom World</h2>

    {% if created %}
    <div class="bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 px-4 py-2 rounded text-sm">
        ✅ Created "{{ created }}" successfully.
    </div>
    {% endif %}

     <form hx-post="{{ url_for('worlds_create_action') }}"
          hx-target="#world-modal-content"
          hx-swap="innerHTML"
          class="grid grid-cols-2 gap-4">
         <div class="col-span-2">
             <label for="world-name" class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Name *</label>
             <input type="text" id="world-name" name="name" required
                    class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-100">
         </div>
         <div>
             <label for="world-parent-id" class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Parent World</label>
             <select id="world-parent-id" name="parent_id"
                     class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-100">
                 <option value="">None (top-level)</option>
                 {% for parent in parents %}
                 <option value="{{ parent.id }}">{{ parent.name }}</option>
                 {% endfor %}
             </select>
         </div>
         <div class="col-span-2">

            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded text-sm hover:bg-blue-700 transition">
                Create World
            </button>
        </div>
    </form>
</div>
