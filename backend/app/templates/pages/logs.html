{% extends "base.html" %}

{% block title %}System Agent Logs - Omniverse{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-10rem)]">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold">System Agent Logs</h1>
        <div class="flex gap-2">
            <button
                class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm"
                hx-get="/logs/list"
                hx-target="#log-container"
                hx-include="#log-filters"
            >
                Refresh
            </button>
        </div>
    </div>

    <div id="log-filters" class="flex flex-wrap gap-3 mb-4">
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">Agent</label>
            <select name="agent" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                    hx-get="{{ url_for('logs_list') }}" hx-trigger="change" hx-target="#log-container" hx-include="#log-filters">
                <option value="">All Agents</option>
                {% for name in agent_names %}
                <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">World</label>
            <select name="world" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                    hx-get="{{ url_for('logs_list') }}" hx-trigger="change" hx-target="#log-container" hx-include="#log-filters">
                <option value="">All Worlds</option>
                {% for name in world_names %}
                <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">Model</label>
            <select name="model" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                    hx-get="{{ url_for('logs_list') }}" hx-trigger="change" hx-target="#log-container" hx-include="#log-filters">
                <option value="">All Models</option>
                {% for m in model_names %}
                <option value="{{ m }}">{{ m }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">Event</label>
            <select name="event_type" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                    hx-get="{{ url_for('logs_list') }}" hx-trigger="change" hx-target="#log-container" hx-include="#log-filters">
                <option value="">All Events</option>
                {% for et in event_types %}
                <option value="{{ et }}">{{ et }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">Tool</label>
            <input type="text" name="tool" placeholder="webSearch..."
                   class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                   hx-get="/logs/list" hx-trigger="keyup changed delay:500ms" hx-target="#log-container" hx-include="#log-filters" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs text-gray-500 uppercase tracking-wide">Search</label>
            <input type="text" name="filter" placeholder="Generic search..."
                   class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-sm"
                   hx-get="/logs/list" hx-trigger="keyup changed delay:500ms" hx-target="#log-container" hx-include="#log-filters" />
        </div>
    </div>

    <div id="log-container" class="flex-1 overflow-y-auto rounded border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900"
         hx-get="/logs/list"
         hx-trigger="load"
         hx-target="this">
        <div class="flex items-center justify-center h-32 text-gray-400">
            Loading logs...
        </div>
    </div>
</div>
{% endblock %}
