{% extends "base.html" %}

{% block title %}Choose World - Omniverse{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="text-center space-y-2">
        <h1 class="text-4xl font-bold">Choose a World</h1>
        <p class="text-gray-500 dark:text-gray-400">Select a universe to start your research journey.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- World Selector (Main) -->
        <div class="md:col-span-2 space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Existing Worlds</h2>
                <div id="database-worlds" 
                     hx-get="/research/database-worlds" 
                     hx-trigger="load" 
                     hx-swap="outerHTML">
                    <p class="text-gray-500 dark:text-gray-400 italic">Loading worlds...</p>
                </div>
            </div>
        </div>

        <!-- World Management (Side) -->
        <div class="space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-4">
                <h2 class="text-lg font-semibold mb-2">Add New World</h2>
                <button class="w-full py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium"
                        onclick="openWorldModal('import')">
                    Import from Registry
                </button>
                <button class="w-full py-2 px-4 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm font-medium"
                        onclick="openWorldModal('create')">
                    Create Custom World
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
