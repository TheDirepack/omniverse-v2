<div class="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
    <div class="flex items-center justify-between border-b pb-2">
        <h3 class="text-lg font-semibold">{{ entry.title }}</h3>
        <span class="text-xs px-2 py-0.5 rounded bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 font-medium">
            {{ entry.kind }}
        </span>
    </div>
    <div class="space-y-3">
        <div>
            <label class="text-[10px] uppercase font-bold text-gray-400 block">Summary</label>
            <p class="text-sm">{{ entry.summary }}</p>
        </div>
        <div>
            <label class="text-[10px] uppercase font-bold text-gray-400 block">Detailed Notes</label>
            <div class="text-sm whitespace-pre-wrap text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-900 p-3 rounded border border-gray-200 dark:border-gray-700">
                {{ entry.details or "No detailed notes provided." }}
            </div>
        </div>
        <div class="flex justify-between items-center pt-2">
            <span class="text-[10px] text-gray-500">Last Updated: {{ entry.updated_at.strftime('%Y-%m-%d %H:%M') }}</span>
            <span class="text-xs font-medium text-gray-500">Status: {{ entry.status }}</span>
        </div>
    </div>
</div>
