{% extends "base.html" %}

{% block title %}Settings - Omniverse{% endblock %}

{% block content %}
<div class="flex flex-col h-full overflow-hidden bg-white dark:bg-gray-950">
    <!-- TAB BAR -->
    <div class="h-11 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 flex items-center px-4 gap-1 shrink-0" role="tablist" id="settings-tab-bar">
        <button role="tab" 
                id="tab-general"
                class="tab-btn px-4 py-1 text-xs font-semibold border-b-2 transition-colors rounded-t-sm {% if request.url.path == '/settings' or request.url.path == '/settings/' %}border-blue-600 text-blue-600 dark:text-blue-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}"
                hx-get="{{ url_for('settings_tab_general') }}"
                hx-target="#settings-content"
                hx-swap="innerHTML"
                hx-indicator="#settings-indicator">
            General
        </button>
        <button role="tab" 
                id="tab-providers"
                class="tab-btn px-4 py-1 text-xs font-medium border-b-2 transition-colors rounded-t-sm {% if '/settings/tab/providers' in request.url.path %}border-blue-600 text-blue-600 dark:text-blue-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}"
                hx-get="{{ url_for('settings_tab_providers') }}"
                hx-target="#settings-content"
                hx-swap="innerHTML"
                hx-indicator="#settings-indicator">
            Providers
        </button>
        <button role="tab" 
                id="tab-routes"
                class="tab-btn px-4 py-1 text-xs font-medium border-b-2 transition-colors rounded-t-sm {% if '/settings/tab/routes' in request.url.path %}border-blue-600 text-blue-600 dark:text-blue-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}"
                hx-get="{{ url_for('settings_tab_routes') }}"
                hx-target="#settings-content"
                hx-swap="innerHTML"
                hx-indicator="#settings-indicator">
            Agent Routes
        </button>
        <button role="tab" 
                id="tab-health"
                class="tab-btn px-4 py-1 text-xs font-medium border-b-2 transition-colors rounded-t-sm {% if '/settings/tab/health' in request.url.path %}border-blue-600 text-blue-600 dark:text-blue-400{% else %}border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}"
                hx-get="{{ url_for('settings_tab_health') }}"
                hx-target="#settings-content"
                hx-swap="innerHTML"
                hx-indicator="#settings-indicator">
            Health
        </button>
        <div id="settings-indicator" class="htmx-indicator flex items-center ml-auto px-4">
            <span class="animate-spin text-xs">⌛</span>
        </div>
    </div>

    <!-- SETTINGS CONTENT -->
    <div id="settings-content" class="flex-1 overflow-y-auto bg-white dark:bg-gray-950 p-4"
         hx-get="/settings/tab/general"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="flex items-center justify-center h-32 text-gray-400 dark:text-gray-600 italic text-xs">
            Loading configuration...
        </div>
    </div>
</div>
{% endblock %}

{% block extra_content %}
<script>
    var TAB_HASHES = { 'tab-general': '', 'tab-providers': 'providers', 'tab-routes': 'routes', 'tab-health': 'health' };

    function activateTabFromHash() {
        var hash = window.location.hash.replace('#', '');
        if (!hash) return;
        var tabId = Object.keys(TAB_HASHES).find(function(k) { return TAB_HASHES[k] === hash; });
        if (tabId) {
            var btn = document.getElementById(tabId);
            if (btn) btn.click();
        }
    }

    document.getElementById('settings-tab-bar').addEventListener('click', function(e) {
        var btn = e.target.closest('.tab-btn');
        if (btn) {
            document.querySelectorAll('.tab-btn').forEach(function(t) {
                t.classList.remove('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
                t.classList.add('border-transparent', 'text-gray-500', 'dark:text-gray-400');
            });
            btn.classList.remove('border-transparent', 'text-gray-500', 'dark:text-gray-400');
            btn.classList.add('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
            var hash = TAB_HASHES[btn.id];
            if (hash !== undefined) {
                history.replaceState(null, '', hash ? '#' + hash : window.location.pathname);
            }
        }
    });

    document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'settings-content') {
            var hash = window.location.hash.replace('#', '');
            var tabId = Object.keys(TAB_HASHES).find(function(k) { return TAB_HASHES[k] === hash; });
            if (tabId) {
                var btn = document.getElementById(tabId);
                if (btn) {
                    document.querySelectorAll('.tab-btn').forEach(function(t) {
                        t.classList.remove('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
                        t.classList.add('border-transparent', 'text-gray-500', 'dark:text-gray-400');
                    });
                    btn.classList.remove('border-transparent', 'text-gray-500', 'dark:text-gray-400');
                    btn.classList.add('border-blue-600', 'text-blue-600', 'dark:text-blue-400');
                }
            }
        }
    });

    document.addEventListener('DOMContentLoaded', activateTabFromHash);

    function selectProvider(providerId) {
        htmx.ajax('GET', `/settings/providers/${providerId}`, {
            target: '#provider-inspector',
            swap: 'innerHTML'
        });
    }

    function selectRoute(routeId) {
        htmx.ajax('GET', `/settings/routes/${routeId}`, {
            target: '#route-editor',
            swap: 'innerHTML'
        });
    }

    function syncModels(providerId) {
        const modelsInput = document.querySelector('input[name="models"]');
        if (!modelsInput) return;
        const originalValue = modelsInput.value;
        modelsInput.classList.add('htmx-indicator');
        modelsInput.disabled = true;

        fetch(`/settings/providers/${providerId}/sync`, { method: 'POST' })
            .then(r => {
                if (!r.ok) throw new Error('Sync failed');
                return r.text();
            })
            .then(models => {
                modelsInput.value = models;
                modelsInput.classList.remove('htmx-indicator');
                modelsInput.disabled = false;
                renderModelList();
            })
            .catch(() => {
                modelsInput.value = originalValue;
                modelsInput.classList.remove('htmx-indicator');
                modelsInput.disabled = false;
                showToast('Failed to sync models.', 'error');
            });

        setTimeout(() => {
            if (modelsInput.classList.contains('htmx-indicator')) {
                modelsInput.value = originalValue;
                modelsInput.classList.remove('htmx-indicator');
                modelsInput.disabled = false;
                showToast('Sync timed out.', 'warning');
            }
        }, 30000);
    }

    function renderModelList() {
        const hidden = document.querySelector('input[name="models"]');
        const container = document.getElementById('model-list');
        if (!hidden || !container) return;
        const models = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
        container.innerHTML = models.map((m, i) =>
            `<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-xs border border-gray-300 dark:border-gray-700">
                ${m}
                <button type="button" onclick="removeModel(${i})" class="text-red-500 hover:text-red-700 leading-none">&times;</button>
            </span>`
        ).join('') +
        `<button type="button" onclick="addModel()" class="px-2 py-0.5 border border-dashed border-gray-400 dark:border-gray-600 rounded text-xs text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">+ Add</button>`;
    }

    function addModel() {
        const name = prompt('Enter model name:');
        if (!name || !name.trim()) return;
        const hidden = document.querySelector('input[name="models"]');
        if (!hidden) return;
        const models = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
        models.push(name.trim());
        hidden.value = models.join(', ');
        renderModelList();
    }

    function removeModel(index) {
        const hidden = document.querySelector('input[name="models"]');
        if (!hidden) return;
        const models = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
        models.splice(index, 1);
        hidden.value = models.join(', ');
        renderModelList();
    }

    function addProviderKey(providerId) {
        const apiKey = prompt('Enter API key:');
        if (!apiKey) return;
        const priority = prompt('Enter priority (0-10):', '0') || '0';
        const form = new FormData();
        form.set('api_key', apiKey);
        form.set('priority', priority);

        const btn = document.querySelector(`button[type="button"][onclick*="addProviderKey('${providerId}')"]`);
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin">⏳</span>';
        }

        htmx.ajax('POST', `/settings/providers/${providerId}/keys`, {
            target: '#settings-content',
            swap: 'innerHTML',
            values: form,
            indicator: '#settings-indicator',
            onError: () => {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '';
                }
                showToast('Failed to add provider key.', 'error');
            }
        });
    }

    function updateBaseUrl(select) {
        var selectedOption = select.options[select.selectedIndex];
        var baseUrl = selectedOption.getAttribute('data-base-url');
        var baseUrlInput = select.form.querySelector('input[name="base_url"]');
        var baseUrlGroup = baseUrlInput ? baseUrlInput.closest('.flex-col') : null;
        if (baseUrl && baseUrlInput) {
            baseUrlInput.value = baseUrl;
            if (baseUrlGroup) baseUrlGroup.style.display = 'none';
        } else if (baseUrlInput) {
            baseUrlInput.value = '';
            if (baseUrlGroup) baseUrlGroup.style.display = '';
        }
    }
</script>
{% endblock %}
