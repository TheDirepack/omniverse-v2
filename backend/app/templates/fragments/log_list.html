{% if parsed_logs %}
{% for log in parsed_logs %}
<div class="px-3 py-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors border-b border-gray-200 dark:border-gray-700">
    <div class="flex items-start gap-2">
        <span class="shrink-0 w-16 text-gray-400">{{ log.timestamp.split()[1] if log.timestamp else '' }}</span>
        <span class="shrink-0 w-20 text-gray-500 truncate" title="{{ log.agent }}">{{ log.agent }}</span>
        <span class="shrink-0 w-16 text-gray-500 truncate" title="{{ log.world }}">{{ log.world }}</span>
        <span class="shrink-0 font-semibold {{ log.color_class }}">{{ log.event_type }}</span>
        <span class="text-gray-700 dark:text-gray-300 break-words min-w-0">{{ log.content }}</span>
    </div>
</div>
{% endfor %}

{% if has_more %}
<div id="load-more-trigger" class="p-3 text-center border-t border-gray-200 dark:border-gray-700">
    <button class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition text-sm"
            hx-get="/logs/list?limit={{ limit }}&offset={{ next_offset }}{% if filter %}&filter={{ filter }}{% endif %}{% if agent %}&agent={{ agent }}{% endif %}{% if world %}&world={{ world }}{% endif %}{% if model %}&model={{ model }}{% endif %}{% if event_type %}&event_type={{ event_type }}{% endif %}{% if tool %}&tool={{ tool }}{% endif %}"
            hx-target="#load-more-trigger"
            hx-swap="outerHTML">
        Load More
    </button>
</div>
{% endif %}
{% else %}
<div class="flex items-center justify-center h-32 text-gray-400">
    No logs found.
</div>
{% endif %}
