{% extends "base.html" %}

{% block title %}Knowledge - Omniverse{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold">Knowledge Explorer</h1>
        <p class="text-gray-500 italic">The canonical Knowledge Graph.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- World Hierarchy -->
        <div class="lg:col-span-1 bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">World Hierarchy</h2>
            <div class="mb-4">
                <input type="text" name="q" 
                       placeholder="Filter worlds..."
                       class="w-full border rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       hx-get="{{ url_for('list_worlds') }}"
                       hx-target="#world-tree"
                       hx-trigger="keyup changed delay:300ms">
            </div>
            <div id="world-tree" 
                  hx-get="{{ url_for('list_worlds') }}" 
                  hx-trigger="load" 
                  hx-swap="innerHTML">
                <p class="text-gray-500 dark:text-gray-400 italic">Loading worlds...</p>
            </div>
        </div>


        <!-- Detail View -->
        <div class="lg:col-span-2 bg-white dark:bg-gray-800 p-6 rounded-lg shadow min-h-[400px]">
            <div id="detail-view">
                <div class="flex flex-col items-center justify-center h-full text-gray-500 dark:text-gray-400 italic">
                    <p>Select a world or entity to view details</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
