<div class="space-y-6">
    <div class="flex justify-between items-start">
        <div>
            <h2 class="text-2xl font-bold text-gray-900">{{ artifact.name }}</h2>
            <div class="flex items-center space-x-2 mt-1">
                <span class="text-xs font-semibold px-2 py-0.5 rounded-full {{ 'bg-green-100 text-green-800' if artifact.verified else 'bg-yellow-100 text-yellow-800' }}">
                    {{ 'Verified' if artifact.verified else 'Unconfirmed' }}
                </span>
                <span class="text-xs text-gray-500">{{ artifact.type }}</span>
            </div>
        </div>
    </div>

    <div class="prose prose-sm max-w-none text-gray-700">
        <p class="text-lg leading-relaxed">{{ artifact.description }}</p>
    </div>

    <div class="border-t border-gray-200 pt-6">
        <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4">Evidence & Provenance</h3>
        <div class="space-y-3">
            {% for evidence in artifact.evidence %}
                <div class="flex items-start space-x-3 p-2 border border-gray-200 hover:bg-gray-50">
                    <div class="flex-1">
                        <a href="{{ evidence.url }}" target="_blank" class="text-sm text-blue-600 hover:underline font-medium">
                            {{ evidence.source_name }}
                        </a>
                        <p class="text-xs text-gray-600 mt-1">{{ evidence.excerpt }}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-mono bg-gray-100 px-1.5 py-0.5 rounded border border-gray-200">
                            Conf: {{ evidence.confidence }}%
                        </span>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
