<table class="w-full text-xs"><thead><tr class="border-b border-gray-200 dark:border-gray-800"><th class="p-2 text-left">Node</th><th class="p-2 text-left">Accepted revision fields</th><th class="p-2">Provenance</th></tr></thead><tbody>{% for node in canon %}<tr class="border-b border-gray-100 dark:border-gray-800"><td class="p-2"><code>{{ node.node_id }}</code><div>{{ node.kind }}</div></td><td class="p-2"><pre class="whitespace-pre-wrap">{{ node.fields|tojson(indent=2) }}</pre></td><td class="p-2"><a class="text-blue-600" href="/provenance/{{ node.node_id }}">Trace</a></td></tr>{% else %}<tr><td colspan="3" class="p-8 text-center text-gray-500">No accepted canon revisions.</td></tr>{% endfor %}</tbody></table>
