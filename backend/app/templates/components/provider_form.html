{% if active_provider %}
<form hx-post="/settings/providers/upsert" hx-target="#settings-content" hx-indicator="#settings-indicator">
    <div class="flex justify-between items-start mb-6">
        <div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ active_provider.name }}</h3>
            <div class="text-xs text-gray-500 dark:text-gray-400">Provider Configuration</div>
        </div>
        <div class="flex gap-2">
            <button type="button" class="px-3 py-1.5 text-xs border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                        hx-post="/settings/providers/{{ active_provider.id }}/delete"
                        hx-target="#settings-content"
                        hx-confirm="Delete this provider?">
                Delete
            </button>
            <button type="submit" class="px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-sm hover:bg-blue-700 transition-colors shadow-sm">
                Save Changes
            </button>
        </div>
    </div>

    <input type="hidden" name="id" value="{{ active_provider.id }}">

    <div class="grid grid-cols-2 gap-6 mb-6">
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Provider Name</label>
            <input type="text" name="name" value="{{ active_provider.name }}"
                    class="h-9 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Provider Type</label>
            <select name="provider_type" onchange="updateBaseUrl(this)"
                    class="h-9 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
                <option value="">Custom</option>
                {% for key, val in presets.items() %}
                <option value="{{ val.provider_type }}" {% if active_provider and active_provider.provider_type == val.provider_type %}selected{% endif %}
                        data-base-url="{{ val.base_url }}">
                    {{ key|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Base URL</label>
            <input type="text" name="base_url" value="{{ active_provider.base_url or '' }}" 
                    class="h-9 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
        </div>
    </div>

<script>
    function updateBaseUrl(select) {
        const selectedOption = select.options[select.selectedIndex];
        const baseUrl = selectedOption.getAttribute('data-base-url');
        const baseUrlInput = select.form.querySelector('input[name="base_url"]');
        if (baseUrl && baseUrlInput) {
            baseUrlInput.value = baseUrl;
        }
    }
</script>

    <div class="flex flex-col gap-1 mb-8">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Supported Models</label>
        <div class="flex gap-2">
            <div class="flex-1">
                <div id="model-list" class="flex flex-wrap gap-1.5"></div>
                <input type="hidden" name="models" value="{{ active_provider.models or '' }}">
                <script>renderModelList();</script>
            </div>
            <button type="button" class="h-9 px-3 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-xs font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-sm flex items-center gap-1"
                    onclick="renderModelList(); syncModels('{{ active_provider.id }}')">
                🔄 Sync
            </button>
        </div>
    </div>

    <div class="space-y-3">
        <div class="flex justify-between items-center">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">API Keys & Priority</label>
            <button type="button" class="text-[10px] px-2 py-0.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-400 rounded-sm hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                    onclick="addProviderKey('{{ active_provider.id }}')">
                + Add Key
            </button>
        </div>
        <table class="w-full text-xs border-collapse">
            <thead class="bg-gray-50 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-left">
                <tr>
                    <th class="p-2 border border-gray-200 dark:border-gray-700">Key</th>
                    <th class="p-2 border border-gray-200 dark:border-gray-700 w-20 text-center">Prio</th>
                    <th class="p-2 border border-gray-200 dark:border-gray-700 w-12 text-right">Act</th>
                </tr>
            </thead>
            <tbody>
                {% for key in api_keys %}
                <tr class="bg-white dark:bg-gray-900">
                    <td class="p-1 border border-gray-200 dark:border-gray-700">
                        <input type="password" name="keys[{{ loop.index0 }}].api_key" value="{{ key.api_key }}" 
                                class="w-full border-none p-1 bg-transparent focus:ring-0 text-xs text-gray-900 dark:text-gray-100">
                    </td>
                    <td class="p-1 border border-gray-200 dark:border-gray-700 text-center">
                        <input type="number" name="keys[{{ loop.index0 }}].priority" value="{{ key.priority }}" 
                                class="w-full border-none p-1 bg-transparent text-center text-xs text-gray-900 dark:text-gray-100">
                    </td>
                    <td class="p-1 border border-gray-200 dark:border-gray-700 text-right">
                        <button type="button" class="text-red-500 hover:text-red-700 transition-colors"
                                hx-post="/settings/providers/{{ active_provider.id }}/keys/{{ key.id }}/delete"
                                hx-target="#settings-content">
                            ✕
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</form>
{% else %}
<!-- CREATE NEW PROVIDER FORM -->
<form hx-post="/settings/providers/upsert" hx-target="#settings-content" hx-indicator="#settings-indicator">
    <div class="space-y-6">
        <div class="space-y-2">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Create New Provider</h3>
            <p class="text-xs text-gray-500 dark:text-gray-400">Define a new API provider to use in your routes.</p>
        </div>

        <div class="space-y-4">
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Provider Name</label>
                <input type="text" name="name" required placeholder="e.g. OpenAI"
                        class="h-10 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Provider Type</label>
                <select name="provider_type" onchange="updateBaseUrl(this)"
                        class="h-10 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
                    <option value="">Custom</option>
                    {% for key, val in presets.items() %}
                    <option value="{{ val.provider_type }}" data-base-url="{{ val.base_url }}">
                        {{ key|capitalize }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Base URL</label>
                <input type="text" name="base_url" placeholder="https://api.openai.com/v1"
                        class="h-10 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Supported Models (CSV)</label>
                <input type="text" name="models" placeholder="gpt-4, gpt-3.5-turbo"
                        class="h-10 border border-gray-300 dark:border-gray-700 px-3 py-1 text-xs bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-500 rounded-sm">
            </div>
        </div>

        <div class="flex gap-3 pt-4">
            <button type="submit" class="flex-1 py-2 bg-blue-600 text-white text-xs font-bold rounded-sm hover:bg-blue-700 transition-colors shadow-sm">
                Create Provider
            </button>
            <button type="button" class="px-4 py-2 text-xs font-semibold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
                    onclick="location.reload()">
                Cancel
            </button>
        </div>
    </div>
</form>
{% endif %}
