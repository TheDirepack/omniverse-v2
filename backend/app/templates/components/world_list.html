<div class="divide-y divide-gray-100 dark:divide-gray-800">
    {% for world in worlds %}
    <div class="p-2.5 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors border-l-4 border-l-transparent hover:border-l-blue-600 {% if selected_world_id == world.id %}bg-blue-50 dark:bg-blue-900/20 border-l-blue-600{% endif %}"
         hx-get="/api/artifacts/list?universe_id={{ world.id }}"
         hx-target="#artifact-list"
         hx-swap="innerHTML"
         onclick="document.querySelectorAll('#world-list-panel > div > div').forEach(function(el) { el.classList.remove('bg-blue-50', 'dark:bg-blue-900/20', 'border-l-blue-600'); }); this.classList.add('bg-blue-50', 'dark:bg-blue-900/20', 'border-l-blue-600'); document.getElementById('artifact-detail').innerHTML = `<div class='flex flex-col items-center justify-center h-full text-gray-400 italic text-xs'>Select an artifact to inspect its details.</div>`;">
        <div class="flex items-center justify-between">
            <div class="min-w-0 flex-1">
                <div class="text-xs font-semibold text-gray-900 dark:text-gray-100 truncate">{{ world.name }}</div>
                {% if world.franchise %}
                <div class="text-[10px] text-gray-400 dark:text-gray-500 truncate">{{ world.franchise }}</div>
                {% endif %}
            </div>
            <div class="flex items-center gap-2 shrink-0 ml-2">
                <span class="text-[10px] px-1.5 py-0.5 bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 rounded-sm font-mono">{{ world.artifact_count }}</span>
                <button class="text-xs text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-200"
                        hx-post="/api/worlds/research"
                        hx-vals='{"payload": ["{{ world.uuid }}"]}'
                        hx-target="body"
                        hx-swap="none">
                    🚀 Research
                </button>
            </div>
        </div>
    </div>
    {% endfor %}
    {% if not worlds %}
    <div class="p-8 text-center text-xs text-gray-400 italic">
        No worlds found.
    </div>
    {% endif %}
</div>
