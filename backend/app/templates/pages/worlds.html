{% extends "base.html" %}

{% block title %}Worlds - Omniverse{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold">Worlds</h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
        <div class="flex border-b border-gray-200 dark:border-gray-700">
            <button class="world-tab-btn px-6 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600"
                    hx-get="/worlds/import"
                    hx-target="#worlds-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                Import World
            </button>
            <button class="world-tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300"
                    hx-get="/worlds/create"
                    hx-target="#worlds-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                Create Custom
            </button>
            <button class="world-tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent hover:border-gray-300"
                    hx-get="/worlds/graph"
                    hx-target="#worlds-content"
                    hx-swap="innerHTML"
                    hx-indicator="#worlds-indicator">
                World Graph
            </button>
            <div id="worlds-indicator" class="htmx-indicator flex items-center ml-auto px-4">
                <span class="animate-spin inline-block">⌛</span>
            </div>
        </div>

        <div id="worlds-content" class="p-6"
             hx-get="/worlds/import"
             hx-trigger="load"
             hx-swap="innerHTML">
            <p class="text-gray-500 dark:text-gray-400 italic">Loading...</p>
        </div>
    </div>
</div>
{% endblock %}
