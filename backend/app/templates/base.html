<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Omniverse{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        function openFocusedSearch(worlds = '', feature = '') {
            const modal = document.getElementById('focused-search-modal');
            const content = document.getElementById('focused-search-content');
            modal.classList.remove('hidden');
            
            htmx.ajax('GET', '/research/focused-search', {
                target: '#focused-search-content',
                swap: 'innerHTML'
            }).then(() => {
                const worldsInp = content.querySelector('[name=worlds]');
                const featInp = content.querySelector('[name=features]');
                if (worldsInp) worldsInp.value = worlds;
                if (featInp) featInp.value = feature;
                if (featInp) featInp.focus();
            });
        }

        function openWorldModal(type) {
            const modal = document.getElementById('world-modal');
            const content = document.getElementById('world-modal-content');
            modal.classList.remove('hidden');

            const endpoint = {
                'import': '/worlds/import',
                'create': '/worlds/create',
                'graph': '/worlds/graph'
            }[type] || '/worlds/import';
            
            htmx.ajax('GET', endpoint, {
                target: '#world-modal-content',
                swap: 'innerHTML'
            });
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
    </script>
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <!-- Focused Search Modal -->
    <div id="focused-search-modal" 
         class="hidden fixed inset-0 z-50 overflow-y-auto bg-black bg-opacity-50 flex items-center justify-center p-4"
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="focused-search-title">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-lg w-full max-h-full overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="focused-search-title" class="text-lg font-semibold">Focused Search</h3>
                 <button data-action="close-focused-search" 
                         class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                        aria-label="Close search modal">
                    <span class="text-2xl" aria-hidden="true">&times;</span>
                </button>
            </div>
            <div id="focused-search-content" class="p-6 overflow-y-auto">
                <div class="flex items-center justify-center h-32">
                    <p class="text-gray-500 dark:text-gray-400 italic">Loading focused search...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- World Management Modal -->
    <div id="world-modal" 
         class="hidden fixed inset-0 z-50 overflow-y-auto bg-black bg-opacity-50 flex items-center justify-center p-4"
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="world-modal-title">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-2xl w-full max-h-full overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 id="world-modal-title" class="text-lg font-semibold">World Management</h3>
                 <button data-action="close-world-modal" 
                         class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200"
                        aria-label="Close world management modal">
                    <span class="text-2xl" aria-hidden="true">&times;</span>
                </button>
            </div>
            <div id="world-modal-content" class="p-6 overflow-y-auto">
                <!-- Content loaded via htmx -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[100] space-y-2"></div>

    <!-- Sidebar -->
    <aside class="w-64 h-full bg-gray-900 text-gray-300 flex flex-col shrink-0 border-r border-gray-800" aria-label="Main Navigation">
        <div class="p-4 text-sm font-black tracking-tighter text-white border-b border-gray-800">
            OMNIVERSE_V2
        </div>
        <nav class="flex-1 p-2 space-y-1 overflow-y-auto">
            <a href="/research/choose-world" class="block px-3 py-2 rounded-md text-sm font-medium transition {% if request.path == '/research/choose-world' %}bg-blue-600 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">Research</a>
            <a href="/worlds" class="block px-3 py-2 rounded-md text-sm font-medium transition {% if request.path == '/worlds' %}bg-blue-600 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">Worlds</a>
            <a href="/knowledge" class="block px-3 py-2 rounded-md text-sm font-medium transition {% if request.path == '/knowledge' %}bg-blue-600 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">Knowledge</a>
            <a href="/logs" class="block px-3 py-2 rounded-md text-sm font-medium transition {% if request.path == '/logs' %}bg-blue-600 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">Logs</a>
            <a href="/settings" class="block px-3 py-2 rounded-md text-sm font-medium transition {% if request.path == '/settings' %}bg-blue-600 text-white{% else %}hover:bg-gray-800 hover:text-white{% endif %}">Settings</a>
        </nav>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-14 flex items-center justify-between px-6 border-b bg-white dark:bg-gray-800 shrink-0">
            <div class="text-sm font-medium text-gray-500 dark:text-gray-400">
                Dashboard
            </div>
            <div class="flex items-center space-x-4">
                 <button data-action="toggle-dark-mode" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                    <span class="dark:hidden" aria-hidden="true">🌙</span>
                    <span class="hidden dark:inline" aria-hidden="true">☀️</span>
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-900" 
              hx-on:htmx:response-error="showToast('An error occurred while processing your request. Please try again.', 'error')">
            <div class="p-6">
                {% block content %}{% endblock %}
            </div>
            <footer class="text-center p-4 text-gray-500 text-sm dark:text-gray-400">
                &copy; 2026 Omniverse Tier List 2.0
            </footer>
        </main>
    </div>

    <script>
        // Dark mode initialization
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Simple Toast System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            toast.className = `${bgColor} text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // HTMX Global Error Handlers
        document.body.addEventListener('htmx:responseError', function(evt) {
            showToast(`Request failed with status ${evt.detail.xhr.status}: ${evt.detail.xhr.statusText}`, 'error');
        });

        document.body.addEventListener('htmx:sendError', function(evt) {
            showToast('A network error occurred. Please check your connection.', 'error');
        });

        // Delegated Event Listener for data-action attributes
        document.body.addEventListener('click', function(e) {
            const target = e.target.closest('[data-action]');
            if (!target) return;

            const action = target.dataset.action;
            
            if (action === 'close-focused-search') {
                document.getElementById('focused-search-modal').classList.add('hidden');
            } else if (action === 'close-world-modal') {
                document.getElementById('world-modal').classList.add('hidden');
            } else if (action === 'toggle-dark-mode') {
                toggleDarkMode();
            } else if (action === 'add-checked-focused-search') {
                addCheckedToFocusedSearch();
            } else if (action === 'add-to-focused-search') {
                addToFocusedSearch(target.dataset.uuid);
            } else if (action === 'open-focused-search') {
                openFocusedSearch();
            } else if (action === 'open-focused-search-with-params') {
                openFocusedSearch(target.dataset.worlds, target.dataset.feature);
            } else if (action === 'open-world-modal') {
                openWorldModal(target.dataset.type);
            } else if (action === 'toggle-edit') {
                toggleEdit(target);
            } else if (action === 'toggle-card') {
                toggleCard(target);
            } else if (action === 'add-route-slot') {
                addRouteSlot(target, target.dataset.taskType, target.dataset.nextPriority);
            } else if (action === 'remove-model-tag') {
                removeModelTag(target);
            } else if (action === 'redirect-to-run') {
                window.location.href = target.dataset.url;
            } else if (action === 'show-structured-data') {
                showToast('Structured Data: ' + target.dataset.json, 'info');
            } else if (action === 'stop-propagation') {
                e.stopPropagation();
            } else if (action === 'confirm-delete-setting') {
                confirmDeleteSetting(target.dataset.key);
            }
        });

        document.addEventListener('keydown', function(event) {

            if (event.key === 'Escape') {
                const modals = ['focused-search-modal', 'world-modal'];
                modals.forEach(id => {
                    const modal = document.getElementById(id);
                    if (modal && !modal.classList.contains('hidden')) {
                        modal.classList.add('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
